name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  ODOO_IMAGE: odoo:19.0
  POSTGRES_DB: odoo_test
  POSTGRES_USER: odoo
  POSTGRES_PASSWORD: odoo

jobs:
  # ── 1. Linting ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 odoo/addons/ \
            --max-line-length=120 \
            --exclude=__pycache__,*.pyc,.git \
            --per-file-ignores="__init__.py:F401" \
            --statistics

  # ── 2. Unit / integration tests ─────────────────────────────────────────────
  tests:
    name: Odoo Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover custom modules
        id: modules
        run: |
          MODULES=$(ls odoo/addons/ | tr '\n' ',' | sed 's/,$//')
          echo "list=$MODULES" >> "$GITHUB_OUTPUT"

      - name: Pull Odoo image
        run: docker pull ${{ env.ODOO_IMAGE }}

      - name: Initialize Odoo database
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/odoo/addons:/mnt/extra-addons" \
            -e HOST=localhost -e PORT=5432 \
            -e USER=${{ env.POSTGRES_USER }} \
            -e PASSWORD=${{ env.POSTGRES_PASSWORD }} \
            ${{ env.ODOO_IMAGE }} \
            odoo \
              --db_host=localhost --db_port=5432 \
              --db_user=${{ env.POSTGRES_USER }} \
              --db_password=${{ env.POSTGRES_PASSWORD }} \
              -d ${{ env.POSTGRES_DB }} \
              --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons \
              -i base \
              --stop-after-init \
              --without-demo=True \
              --log-level=warn

      - name: Install modules and run tests
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/odoo/addons:/mnt/extra-addons" \
            -e HOST=localhost -e PORT=5432 \
            -e USER=${{ env.POSTGRES_USER }} \
            -e PASSWORD=${{ env.POSTGRES_PASSWORD }} \
            ${{ env.ODOO_IMAGE }} \
            odoo \
              --db_host=localhost --db_port=5432 \
              --db_user=${{ env.POSTGRES_USER }} \
              --db_password=${{ env.POSTGRES_PASSWORD }} \
              -d ${{ env.POSTGRES_DB }} \
              --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons \
              -i "${{ steps.modules.outputs.list }}" \
              --test-tags "${{ steps.modules.outputs.list }}" \
              --stop-after-init \
              --log-level=test \
              --without-demo=True

  # ── 3. Build Docker image ────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # odoo.conf is in .gitignore and won't exist in CI checkout.
      # Copy the example file so the Dockerfile COPY step finds it.
      - name: Prepare odoo.conf for build
        run: cp infrastructure/config/odoo.conf.example infrastructure/config/odoo.conf

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # context is repo root so Dockerfile COPY paths resolve correctly:
      #   odoo/addons/        → COPY odoo/addons/ /mnt/extra-addons/
      #   infrastructure/config/odoo.conf → COPY infrastructure/config/odoo.conf ...
      - name: Build image (validation only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile
          push: false
          tags: odoo-custom:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
