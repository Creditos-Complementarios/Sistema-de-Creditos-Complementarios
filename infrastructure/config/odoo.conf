[options]
; ============================================================
;  odoo.conf — Configuración de desarrollo local
;  Este archivo está en .gitignore. Ver odoo.conf.example
;  para la plantilla sin valores reales.
; ============================================================

db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
http_port = 8069
longpolling_port = 8072
log_level = info
workers = 0

; Contraseña maestra del gestor de bases de datos.
; CAMBIAR antes de cualquier despliegue. Nunca usar 'admin'.
admin_passwd = changeme_local
